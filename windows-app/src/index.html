<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalDrop – LAN File Transfer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="/main.js" defer></script>
</head>
<body>
  <div class="app-container">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="logo-area">
        <svg class="app-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <h1>LocalDrop</h1>
      </div>
      <div class="server-status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Starting HTTP server…</span>
      </div>
    </header>

    <!-- ── Main Two-Column Layout ── -->
    <main class="app-workspace">

      <!-- ── Left: QR / Connect Panel ── -->
      <section class="panel connect-panel">
        <div class="panel-header">
          <h2>Connect Your Phone</h2>
          <span class="panel-tag">Step 1</span>
        </div>

        <!-- Skeleton shown while server starts -->
        <div class="qr-placeholder" id="qr-placeholder">
          <div class="qr-spinner"></div>
          <p>Starting server…</p>
        </div>

        <!-- QR code (revealed once server starts) -->
        <div class="qr-ready" id="qr-ready" style="display:none">
          <div class="qr-frame">
            <img id="qr-image" class="qr-image" alt="QR Code to open on your phone">
          </div>
          <div class="url-row">
            <span class="url-text" id="server-url-text"></span>
            <button class="copy-btn" id="copy-url-btn" title="Copy URL to clipboard">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span id="copy-btn-label">Copy</span>
            </button>
          </div>
          <p class="connect-hint">
            Scan the QR code or type the URL in your phone's browser while on the same Wi-Fi network.
          </p>
        </div>
      </section>

      <!-- ── Right: Shared Files Panel ── -->
      <section class="panel files-panel">
        <div class="panel-header">
          <h2>Files for Download</h2>
          <div class="panel-header-right">
            <span class="badge" id="files-count">0</span>
            <span class="panel-tag">Phone can download</span>
          </div>
        </div>

        <div class="shared-scroll" id="shared-scroll">
          <!-- Empty state -->
          <div class="empty-state" id="files-empty">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
              <rect x="8" y="4" width="36" height="44" rx="4" stroke="currentColor" stroke-width="1.5"/>
              <path d="M20 20h20M20 28h16M20 36h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="46" cy="46" r="12" fill="#7c6af7"/>
              <path d="M46 41v10M41 46h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <p>No files shared yet.<br>Add a file to make it available on your phone.</p>
          </div>

          <!-- File list -->
          <div class="files-list" id="files-list" style="display:none">
            <!-- populated by JS -->
          </div>
        </div>

        <button class="btn-add-file" id="btn-add-file">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Add File to Share
        </button>
      </section>
    </main>

    <!-- ── Transfers Panel (revealed when uploads begin) ── -->
    <section class="transfers-section" id="transfers-section" style="display:none">
      <div class="transfers-header">
        <h2>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 11 21 7 17 3"/>
            <line x1="21" y1="7" x2="9" y2="7"/>
            <polyline points="7 21 3 17 7 13"/>
            <line x1="3" y1="17" x2="15" y2="17"/>
          </svg>
          Active Transfers
        </h2>
        <button class="btn-clear" id="btn-clear-transfers">Clear</button>
      </div>
      <div class="transfers-list" id="transfers-list">
        <!-- transfer items injected by JS -->
      </div>
    </section>

  </div><!-- .app-container -->
</body>
</html>
