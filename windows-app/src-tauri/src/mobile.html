<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d14">
  <title>LocalDrop – File Transfer</title>
  <style>
    :root {
      --bg:        #0d0d14;
      --surface:   #16161f;
      --surface2:  #1e1e2e;
      --accent:    #7c6af7;
      --accent2:   #a855f7;
      --success:   #22c55e;
      --danger:    #ef4444;
      --warn:      #f59e0b;
      --text:      #e8e8f0;
      --muted:     #6b6b82;
      --border:    rgba(255,255,255,0.07);
      --radius:    16px;
      --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 env(safe-area-inset-bottom, 20px);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 28px 20px 20px;
      background: linear-gradient(180deg, rgba(124,106,247,0.12) 0%, transparent 100%);
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: var(--muted); font-size: 13px; margin-top: 3px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      margin: 0 16px 20px;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 11px 8px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    /* ── Panel ── */
    .panel { display: none; padding: 0 16px; }
    .panel.active { display: block; }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--surface);
      margin-bottom: 14px;
      -webkit-tap-highlight-color: transparent;
    }
    .upload-zone.dragover { border-color: var(--accent); background: rgba(124,106,247,0.08); }
    .upload-zone.has-file { border-color: rgba(124,106,247,0.5); border-style: solid; }
    .upload-zone-emoji { font-size: 44px; margin-bottom: 12px; display: block; }
    .upload-zone-primary { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .upload-zone-secondary { font-size: 13px; color: var(--muted); }
    #file-input { display: none; }

    /* ── Queue list ── */
    .queue-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .queue-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      animation: slide-up 0.2s ease;
    }
    @keyframes slide-up { from { opacity:0; transform:translateY(6px); } }
    .qi-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .qi-emoji { font-size:18px; flex-shrink:0; }
    .qi-name { flex:1; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qi-status { font-size:11px; font-weight:600; white-space:nowrap; }
    .qi-status.waiting  { color: var(--muted); }
    .qi-status.active   { color: var(--accent); }
    .qi-status.done     { color: var(--success); }
    .qi-status.error    { color: var(--danger); }
    .qi-bar  { height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:5px; }
    .qi-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%; transition:width 0.3s; }
    .queue-item.done .qi-fill  { background: var(--success); width:100%; }
    .queue-item.error .qi-fill { background: var(--danger); }
    .qi-foot { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }

    /* ── File Card ── */
    .file-info-card {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 14px;
      align-items: center;
      gap: 14px;
    }
    .file-info-card.visible { display: flex; }
    .file-type-badge {
      font-size: 28px;
      flex-shrink: 0;
    }
    .file-meta { flex: 1; min-width: 0; }
    .file-name-text { font-weight: 600; font-size: 14px; word-break: break-all; line-height: 1.3; }
    .file-size-text { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .clear-file-btn {
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Progress ── */
    .progress-section {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .progress-section.visible { display: block; }
    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .progress-pct-text { font-size: 15px; font-weight: 700; color: var(--accent); }
    .progress-bar {
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-foot {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
    .status-pill {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }
    .status-pill.visible { display: block; }
    .status-pill.active  { background: rgba(124,106,247,0.12); color: #a99cf9; }
    .status-pill.success { background: rgba(34,197,94,0.12);  color: var(--success); }
    .status-pill.error   { background: rgba(239,68,68,0.12);  color: var(--danger); }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      margin-top: 10px;
    }
    .btn-secondary:active { transform: scale(0.98); }

    /* ── Download List ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .list-title { font-size: 15px; font-weight: 600; }
    .refresh-pill {
      background: var(--surface2);
      border: none;
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .file-cards { display: flex; flex-direction: column; gap: 10px; }
    .dl-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .dl-icon {
      width: 44px; height: 44px;
      background: rgba(124,106,247,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .dl-info { flex: 1; min-width: 0; }
    .dl-name { font-weight: 600; font-size: 14px; word-break: break-all; margin-bottom: 3px; }
    .dl-size { font-size: 12px; color: var(--muted); }
    .dl-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 9px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .empty-card {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-emoji { font-size: 48px; display: block; margin-bottom: 14px; }
    .empty-card p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">LocalDrop</div>
    <div class="subtitle">LAN File Transfer</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-upload" onclick="switchTab('upload')">
      <span>📤</span> Upload to PC
    </button>
    <button class="tab-btn" id="tab-download" onclick="switchTab('download')">
      <span>📥</span> Download from PC
    </button>
  </div>

  <!-- ── Upload Panel ── -->
  <div class="panel active" id="panel-upload">
    <div class="upload-zone" id="upload-zone" onclick="triggerPicker()">
      <span class="upload-zone-emoji" id="zone-emoji">📁</span>
      <div class="upload-zone-primary" id="zone-primary">Tap to choose files</div>
      <div class="upload-zone-secondary" id="zone-secondary">Any type • Any size • Multiple files OK</div>
    </div>
    <input type="file" id="file-input" multiple>

    <!-- per-file queue rows injected here -->
    <div class="queue-list" id="queue-list" style="display:none"></div>

    <button class="btn btn-primary" id="upload-btn" disabled onclick="startQueue()">
      ↑ &nbsp;Upload <span id="upload-count"></span>
    </button>
    <button class="btn btn-secondary" id="cancel-btn" style="display:none" onclick="cancelUpload()">
      Cancel Current
    </button>
    <button class="btn btn-secondary" id="clear-btn" style="display:none; margin-top:8px" onclick="clearAll()">
      Clear All
    </button>
  </div>

  <!-- ── Download Panel ── -->
  <div class="panel" id="panel-download">
    <div class="list-header">
      <span class="list-title">Available Files</span>
      <button class="refresh-pill" onclick="loadFiles()">↺ Refresh</button>
    </div>
    <div class="file-cards" id="file-cards">
      <div class="empty-card">
        <span class="empty-emoji">⏳</span>
        <p>Loading files…</p>
      </div>
    </div>
  </div>

  <script>
    /* ──────────────── Utilities ──────────────── */
    function formatBytes(b) {
      if (!b || b === 0) return '0 B';
      const k = 1024, s = ['B','KB','MB','GB','TB'];
      const i = Math.floor(Math.log(b) / Math.log(k));
      return (b / Math.pow(k, i)).toFixed(1) + ' ' + s[i];
    }

    function fileEmoji(name) {
      const ext = ((name || '').split('.').pop() || '').toLowerCase();
      const m = {
        jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',heic:'🖼️',svg:'🖼️',bmp:'🖼️',
        mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',webm:'🎬',m4v:'🎬',
        mp3:'🎵',wav:'🎵',flac:'🎵',aac:'🎵',ogg:'🎵',m4a:'🎵',
        pdf:'📕',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📽️',pptx:'📽️',
        zip:'📦',rar:'📦','7z':'📦',tar:'📦',gz:'📦',
        exe:'⚙️',msi:'⚙️',apk:'📱',ipa:'📱',dmg:'💿',iso:'💿',
        txt:'📃',md:'📃',json:'📋',xml:'📋',csv:'📋',log:'📋',
        js:'🟨',ts:'🟦',py:'🐍',rs:'🦀',html:'🌐',css:'🎨',
      };
      return m[ext] || '📄';
    }

    /* ──────────────── Tabs ──────────────── */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'download') loadFiles();
    }

    /* ──────────────── Upload Queue ──────────────── */
    const fileInput   = document.getElementById('file-input');
    const uploadZone  = document.getElementById('upload-zone');
    const zoneEmoji   = document.getElementById('zone-emoji');
    const zonePrimary = document.getElementById('zone-primary');
    const zoneSec     = document.getElementById('zone-secondary');
    const queueList   = document.getElementById('queue-list');
    const uploadBtn   = document.getElementById('upload-btn');
    const uploadCount = document.getElementById('upload-count');
    const cancelBtn   = document.getElementById('cancel-btn');
    const clearBtn    = document.getElementById('clear-btn');

    // Queue: array of { file, el, fillEl, statusEl, footEl }
    let queue = [];
    let currentXHR = null;
    let uploading  = false;

    function triggerPicker() { fileInput.click(); }

    // Add files to the queue (merge with existing)
    function addFilesToQueue(files) {
      Array.from(files).forEach(file => {
        // Skip duplicates already in queue
        if (queue.some(q => q.file.name === file.name && q.file.size === file.size)) return;

        const item = document.createElement('div');
        item.className = 'queue-item';
        item.innerHTML = `
          <div class="qi-head">
            <span class="qi-emoji">${fileEmoji(file.name)}</span>
            <span class="qi-name" title="${file.name}">${file.name}</span>
            <span class="qi-status waiting">⏳ Waiting</span>
          </div>
          <div class="qi-bar"><div class="qi-fill"></div></div>
          <div class="qi-foot">
            <span class="qi-bytes">${formatBytes(file.size)}</span>
            <span class="qi-speed"></span>
          </div>`;

        queue.push({
          file,
          el:       item,
          fillEl:   item.querySelector('.qi-fill'),
          statusEl: item.querySelector('.qi-status'),
          footEl:   item.querySelector('.qi-bytes'),
          speedEl:  item.querySelector('.qi-speed'),
        });
        queueList.appendChild(item);
      });

      const pending = queue.filter(q => q.state !== 'done' && q.state !== 'error').length;
      if (pending > 0) {
        queueList.style.display = 'flex';
        uploadZone.classList.add('has-file');
        zoneEmoji.textContent   = '📂';
        zonePrimary.textContent = pending + ' file' + (pending > 1 ? 's' : '') + ' selected';
        zoneSec.textContent     = 'Tap to add more';
        uploadCount.textContent = pending + ' file' + (pending > 1 ? 's' : '');
        uploadBtn.disabled = false;
        clearBtn.style.display = 'block';
      }
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) addFilesToQueue(fileInput.files);
      fileInput.value = ''; // reset so same file can be re-added next time
    });

    // Drag & drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) addFilesToQueue(e.dataTransfer.files);
    });

    function clearAll() {
      if (uploading) return;
      queue = [];
      queueList.innerHTML = '';
      queueList.style.display = 'none';
      uploadZone.classList.remove('has-file');
      zoneEmoji.textContent   = '📁';
      zonePrimary.textContent = 'Tap to choose files';
      zoneSec.textContent     = 'Any type • Any size • Multiple files OK';
      uploadBtn.disabled = true;
      uploadCount.textContent = '';
      clearBtn.style.display = 'none';
    }

    function cancelUpload() {
      if (currentXHR) currentXHR.abort();
    }

    /* Upload one file, returns a Promise that resolves when done */
    function uploadOne(entry) {
      return new Promise(resolve => {
        const { file, fillEl, statusEl, speedEl, footEl, el } = entry;
        entry.state = 'active';
        statusEl.textContent = '📡 Uploading…';
        statusEl.className   = 'qi-status active';
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        const startTime = Date.now();
        const xhr = new XMLHttpRequest();
        currentXHR = xhr;

        xhr.open('POST', '/upload', true);
        xhr.setRequestHeader('X-File-Name', encodeURIComponent(file.name));
        xhr.setRequestHeader('Content-Type', 'application/octet-stream');

        xhr.upload.onprogress = (e) => {
          const elapsed = Math.max((Date.now() - startTime) / 1000, 0.001);
          const speed   = (e.loaded / 1048576) / elapsed;
          const pct     = e.lengthComputable ? Math.round(e.loaded / e.total * 100) : 0;
          fillEl.style.width      = pct + '%';
          statusEl.textContent    = pct + '%';
          footEl.textContent      = formatBytes(e.loaded) + (e.lengthComputable ? ' / ' + formatBytes(e.total) : '');
          speedEl.textContent     = speed.toFixed(1) + ' MB/s';
        };

        xhr.onload = () => {
          currentXHR = null;
          if (xhr.status === 200) {
            entry.state          = 'done';
            el.className         = 'queue-item done';
            fillEl.style.width   = '100%';
            statusEl.textContent = '✅ Done';
            statusEl.className   = 'qi-status done';
            speedEl.textContent  = '';
          } else {
            entry.state          = 'error';
            el.className         = 'queue-item error';
            statusEl.textContent = '❌ ' + xhr.status;
            statusEl.className   = 'qi-status error';
          }
          resolve();
        };
        xhr.onerror = () => {
          currentXHR = null;
          entry.state          = 'error';
          el.className         = 'queue-item error';
          statusEl.textContent = '❌ Network error';
          statusEl.className   = 'qi-status error';
          resolve();
        };
        xhr.onabort = () => {
          currentXHR = null;
          entry.state          = 'error';
          el.className         = 'queue-item error';
          statusEl.textContent = '⚠️ Cancelled';
          statusEl.className   = 'qi-status error';
          resolve();
        };

        xhr.send(file);
      });
    }

    /* Run the full queue sequentially */
    async function startQueue() {
      if (uploading) return;
      uploading = true;
      uploadBtn.disabled = true;
      cancelBtn.style.display = 'block';
      clearBtn.style.display  = 'none';

      const pending = queue.filter(q => q.state !== 'done' && q.state !== 'error');
      for (const entry of pending) {
        await uploadOne(entry);
      }

      uploading = false;
      currentXHR = null;
      cancelBtn.style.display = 'none';

      const allDone  = queue.every(q => q.state === 'done');
      const anyError = queue.some(q => q.state === 'error');
      if (allDone) {
        uploadBtn.textContent   = '✅ All uploaded!';
        uploadCount.textContent = '';
      } else if (anyError) {
        uploadBtn.textContent   = '↑ Retry failed';
        uploadBtn.disabled      = false;
        uploadCount.textContent = '';
      }
      clearBtn.style.display = 'block';
    }

    /* ──────────────── Download ──────────────── */
    async function loadFiles() {
      const container = document.getElementById('file-cards');
      container.innerHTML = '<div class="empty-card"><span class="empty-emoji">⏳</span><p>Loading…</p></div>';
      try {
        const res   = await fetch('/files');
        const files = await res.json();
        if (!files || files.length === 0) {
          container.innerHTML = '<div class="empty-card"><span class="empty-emoji">📭</span><p>No files shared yet.<br>Add files in the Windows app first.</p></div>';
          return;
        }
        container.innerHTML = '';
        files.forEach(f => {
          const card = document.createElement('div');
          card.className = 'dl-card';
          card.innerHTML = `
            <div class="dl-icon">${fileEmoji(f.name)}</div>
            <div class="dl-info">
              <div class="dl-name">${f.name}</div>
              <div class="dl-size">${formatBytes(f.size)}</div>
            </div>
            <a class="dl-btn" href="/files/${f.id}" download="${f.name}">↓ Save</a>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = '<div class="empty-card"><span class="empty-emoji">❌</span><p>Could not load files.<br>Check your Wi-Fi connection.</p></div>';
      }
    }

    /* Auto-load downloads when tab is visible */
    if (document.getElementById('panel-download').classList.contains('active')) loadFiles();
  </script>
</body>
</html>
