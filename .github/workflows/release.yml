name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allows manual trigger from the Actions tab

permissions:
  contents: write   # required so the workflow can create/attach GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: windows-app
        run: npm install

      - name: Build Tauri app
        working-directory: windows-app
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localdrop-windows
          path: |
            windows-app/src-tauri/target/release/bundle/msi/*.msi
            windows-app/src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-app/src-tauri/target/release/bundle/msi/*.msi
            windows-app/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}